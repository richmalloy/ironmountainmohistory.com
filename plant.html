<script>
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x11161b);
scene.fog=new THREE.Fog(0x11161b,120,420);
const camera=new THREE.PerspectiveCamera(55,2,0.1,1200);
let target=new THREE.Vector3(6,6,0);
camera.position.set(55,30,70);
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const sun=new THREE.DirectionalLight(0xfff2dd,0.95); sun.position.set(60,90,40); scene.add(sun);

// scale: 1 unit ≈ 3 ft. Shaft at origin-ish; headframe over it; hoist house WEST (left) of headframe (RM: headframe to the right of the house).
const timed=[]; function T(o,s,e){timed.push({obj:o,start:s??-1e9,end:e??1e9});scene.add(o);return o;}
function label(t,size,color){const c=document.createElement('canvas');c.width=1024;c.height=200;
 const g=c.getContext('2d');g.font='600 40px monospace';g.fillStyle=color||'#efe6d0';
 g.textBaseline='middle';g.shadowColor='#000';g.shadowBlur=8;g.fillText(t,20,100);
 const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false}));
 sp.scale.set(size*5.12,size,1);return sp;}

// ground + faint yard grid
const g1=new THREE.Mesh(new THREE.PlaneGeometry(300,220),
 new THREE.MeshLambertMaterial({color:0x53614a}));
g1.rotation.x=-Math.PI/2; T(g1);
const grid=new THREE.GridHelper(300,30,0x2c3a44,0x22303a);
grid.material.transparent=true;grid.material.opacity=0.25;T(grid);
// rail spur past the plant
const rail=new THREE.Mesh(new THREE.BoxGeometry(300,0.15,1.4),new THREE.MeshLambertMaterial({color:0x6b6258}));
rail.position.set(0,0.1,26); rail.rotation.y=-0.18; T(rail,1858);
const railL=label('INTERNAL RAIL',3.5,'#a99f8c'); railL.position.set(-56,2.5,36); T(railL,1858);

// ===== ERA 1: wooden works ~1885–1923 =====
const wood=new THREE.Group();
const whh=new THREE.Mesh(new THREE.BoxGeometry(14,7,9),new THREE.MeshLambertMaterial({color:0x7a6248}));
whh.position.set(-14,3.5,0); wood.add(whh);
const wroof=new THREE.Mesh(new THREE.ConeGeometry(9.5,4,4),new THREE.MeshLambertMaterial({color:0x4f4030}));
wroof.rotation.y=Math.PI/4; wroof.position.set(-14,9,0); wood.add(wroof);
// timber headframe: A-frame of logs over the shaft
const logM=new THREE.MeshLambertMaterial({color:0x5c4a36});
[[-3.5,0],[3.5,0],[0,-3.5],[0,3.5]].forEach(p=>{
 const l=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.5,22,6),logM);
 l.position.set(p[0]*0.5,11,p[1]*0.5);
 l.lookAt(new THREE.Vector3(0,22,0)); l.rotateX(Math.PI/2); wood.add(l);});
const wdeck=new THREE.Mesh(new THREE.BoxGeometry(4,1.4,4),logM); wdeck.position.y=22; wood.add(wdeck);
// boiler stack + smoke
const wst=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.9,12,7),new THREE.MeshLambertMaterial({color:0x3f342a}));
wst.position.set(-22,6,-3); wood.add(wst);
for(let i=0;i<3;i++){const puff=new THREE.Mesh(new THREE.SphereGeometry(1.4+i*0.8,7,7),
 new THREE.MeshBasicMaterial({color:0xcccccc,transparent:true,opacity:0.32-i*0.08}));
 puff.position.set(-22+i*1.2,13.5+i*2.6,-3); wood.add(puff);}
wood.position.set(30,0,0); T(wood,1885,1923);
const woodL=label('WOODEN HOIST WORKS — steam',4.5,'#e8c9a0'); woodL.position.set(16,15,8); T(woodL,1885,1923);
const f23=label('★ SEPT 18, 1923 — FIRE',5,'#ff6a3a'); f23.position.set(22,18,4); T(f23,1923,1926);

// ===== interregnum 1923–1951: bare shaft collar =====
const collar=new THREE.Mesh(new THREE.BoxGeometry(4,0.8,4),new THREE.MeshLambertMaterial({color:0x3a3f45}));
collar.position.set(30,0.4,0); T(collar,1923,1951);
const colL=label('BARE COLLAR — the idle years',4,'#8b949c'); colL.position.set(30,4,8); T(colL,1930,1944);

// ===== ERA 2: the brick plant, ~1951–present =====
// long brick building: hoist room (east end) + office/post office (west end)
const brick=new THREE.MeshLambertMaterial({color:0x8a5040});
const bldg=new THREE.Group();
// one LONG lean building (per 2020 aerial): hoist room (taller, east end) + office wing, continuous
const hoistRoom=new THREE.Mesh(new THREE.BoxGeometry(14,8.5,9),brick); hoistRoom.position.set(-13,4.25,0); bldg.add(hoistRoom);
const office=new THREE.Mesh(new THREE.BoxGeometry(32,7,8.6),brick); office.position.set(-36,3.5,0); bldg.add(office);
// glass block band (the Christmas window wall)
const glass=new THREE.Mesh(new THREE.BoxGeometry(12,2.2,0.3),
 new THREE.MeshLambertMaterial({color:0xbfd8e8,emissive:0x224455}));
glass.position.set(-36,4.5,4.5); bldg.add(glass);
// gable roofs: gray era, then red metal (aerial) after 1997
function gable(len,wid,x,y,color){
 const g=new THREE.Mesh(new THREE.CylinderGeometry(wid*0.62,wid*0.62,len,3),
  new THREE.MeshLambertMaterial({color}));
 g.rotation.z=Math.PI/2; g.rotation.x=Math.PI; g.position.set(x,y,0); g.scale.y=1; return g;}
const rGray1=gable(15,9,-13,9.4,0x5a4a44), rGray2=gable(33,8.6,-36,8.1,0x5a4a44);
const rRed1 =gable(15,9,-13,9.4,0x7a2a28), rRed2 =gable(33,8.6,-36,8.1,0x7a2a28);
bldg.add(rGray1,rGray2); T(bldg,1951);
const redRoofs=new THREE.Group(); redRoofs.add(rRed1.clone(),rRed2.clone()); T(redRoofs,1997);
// hide gray roofs in red era via timed overlay trick: gray roofs as separate timed group
bldg.remove(rGray1); bldg.remove(rGray2);
const grayRoofs=new THREE.Group(); grayRoofs.add(rGray1,rGray2); T(grayRoofs,1951,1997);
const bL=label('BRICK HOIST HOUSE + OFFICE (P.O. until 1978)',4.2,'#e8c9a0'); bL.position.set(-26,12,9); T(bL,1951);

// steel headframe over the shaft (east of / right of the house — per RM)
const steel=new THREE.MeshLambertMaterial({color:0x6e4438});
const shf=new THREE.Group();
[[-2.6,-2.6],[2.6,-2.6],[-2.6,2.6],[2.6,2.6]].forEach(p=>{
 const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.5,26,7),steel);
 leg.position.set(p[0]*0.55,13,p[1]*0.55); shf.add(leg);});
// backlegs toward the hoist house
[[-1.2],[1.2]].forEach(p=>{
 const bk=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.4,29,7),steel);
 bk.position.set(-7,12.5,p[0]); bk.rotation.z=0.55; shf.add(bk);});
// bracing
for(let y=5;y<=21;y+=5){const br=new THREE.Mesh(new THREE.BoxGeometry(4.6,0.3,4.6),steel);
 br.position.y=y; shf.add(br);}
const sdeck=new THREE.Mesh(new THREE.BoxGeometry(5,1.6,5),steel); sdeck.position.y=26; shf.add(sdeck);
// sheave wheels
[[-0.9],[0.9]].forEach(p=>{
 const sh=new THREE.Mesh(new THREE.TorusGeometry(1.5,0.22,8,18),new THREE.MeshLambertMaterial({color:0x3a3f45}));
 sh.position.set(0,27.6,p[0]); sh.rotation.y=Math.PI/2; shf.add(sh);});
shf.position.set(30,0,0); T(shf,1951);
const hfL=label('STEEL HEADFRAME — "B" SHAFT',4.5,'#ffb26b'); hfL.position.set(30,31,7); T(hfL,1951);
// hoist ropes: house -> sheaves -> shaft (working era only)
function rope(x1,y1,z1,x2,y2,z2){
 const dir=new THREE.Vector3(x2-x1,y2-y1,z2-z1); const len=dir.length();
 const m=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,len,4),
  new THREE.MeshBasicMaterial({color:0xd8d0c0}));
 m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
 m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize()); return m;}
T(rope(-7,7,-0.9, 30,27.6,-0.9),1951,1966);
T(rope(-7,7, 0.9, 30,27.6, 0.9),1951,1966);
T(rope(30,27.6,-0.9,30,1,-0.9),1951,1966);
T(rope(30,27.6, 0.9,30,1, 0.9),1951,1966);
const ropeL=label('ROPES CROSSING THE YARD — drums in the house, sheaves on the frame',3.4,'#d8d0c0'); ropeL.position.set(10,20,-5); T(ropeL,1954,1966);
const endL=label('1966 — the ropes come down',4,'#8b949c'); endL.position.set(10,20,-5); T(endL,1966,1970);

// water towers east of headframe (extant)
[[42,2.8,2.8,24,true],[48,-3,1.9,9,false]].forEach(t=>{ // big tower rivals the headframe; small tank squat
 const grp=new THREE.Group();
 const tank=new THREE.Mesh(new THREE.CylinderGeometry(t[2],t[2],4.2,10),new THREE.MeshLambertMaterial({color:0x7a5240}));
 tank.position.y=t[3]; grp.add(tank);
 if(t[4]){ const cap=new THREE.Mesh(new THREE.ConeGeometry(t[2]*1.05,1.8,10),
   new THREE.MeshLambertMaterial({color:0x6a4638})); cap.position.y=t[3]+3; grp.add(cap); }
 [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(p=>{
  const lg=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.24,t[3]-2,5),steel);
  lg.position.set(p[0]*t[2]*0.55,(t[3]-2)/2,p[1]*t[2]*0.55); grp.add(lg);});
 grp.position.set(t[0],0,t[1]); T(grp,1951);
});
const wtL=label('WATER TANKS — fire & service',4,'#c9a284'); wtL.position.set(45,19,0); T(wtL,1951);

// THICKENER behind (west of) the house — octagonal ring; fills with rock ~1968
const oct=new THREE.Mesh(new THREE.TorusGeometry(4.2,0.6,6,8),
 new THREE.MeshLambertMaterial({color:0x9a998c}));
oct.rotation.x=Math.PI/2; oct.position.set(-50,0.6,-6); T(oct,1951);
// rakes turning (working era) — two arms
const rakes=new THREE.Group();
[[0],[Math.PI/2]].forEach(a=>{const arm=new THREE.Mesh(new THREE.BoxGeometry(7.6,0.25,0.4),
 new THREE.MeshLambertMaterial({color:0x555a60})); arm.rotation.y=a[0]; rakes.add(arm);});
rakes.position.set(-50,1.1,-6); T(rakes,1951,1967);
// rock fill after closure
const fill=new THREE.Mesh(new THREE.ConeGeometry(3.9,1.6,8),
 new THREE.MeshLambertMaterial({color:0x6e6a60}));
fill.position.set(-50,0.8,-6); T(fill,1968);
const thL=label('THICKENER — mine-water clarifier',3.8,'#c9c2ae'); thL.position.set(-50,5,0); T(thL,1951,1967);
const thL2=label('THICKENER — rock-filled at closure',3.8,'#9a998c'); thL2.position.set(-50,5,0); T(thL2,1968);

// the MILL — tiered gravity mill ADJACENT to the headframe (per the Ozark Ore hero photo); burns 1978
const millMat=new THREE.MeshLambertMaterial({color:0x5f5346});
const mill=new THREE.Group();
// tall compact mill block (per hero photo): ~4 stories, dark, vertical
const m1=new THREE.Mesh(new THREE.BoxGeometry(11,17,10),millMat); m1.position.set(0,8.5,0); mill.add(m1);
const m2=new THREE.Mesh(new THREE.BoxGeometry(8,12,9),millMat);   m2.position.set(9,6,0);   mill.add(m2);
const m3=new THREE.Mesh(new THREE.BoxGeometry(7,7,8),millMat);    m3.position.set(15.5,3.5,0); mill.add(m3);
[[0,17.4,11.5],[9,12.4,8.5],[15.5,7.4,7.5]].forEach(p=>{
  const rf=new THREE.Mesh(new THREE.BoxGeometry(p[2],0.6,10.2),new THREE.MeshLambertMaterial({color:0x453c33}));
  rf.position.set(p[0],p[1],0); mill.add(rf);});
// the inclined ore-bridge conveyor descending from the mill top out over the stockpiles (hero's signature)
const conv=new THREE.Mesh(new THREE.BoxGeometry(34,1.1,2.2),millMat);
conv.position.set(20,10,4); conv.rotation.z=-0.42; conv.rotation.y=0.25; mill.add(conv);
mill.position.set(38,0,-14); T(mill,1944,1978);
// stockpiles under the conveyor's end (working era)
[[68,-4,10,6],[78,-12,13,7.5],[61,-16,8,5]].forEach(p=>{
  const sp=new THREE.Mesh(new THREE.ConeGeometry(p[2],p[3],9),
    new THREE.MeshLambertMaterial({color:0x6e5a4c}));
  sp.position.set(p[0],p[3]/2,p[1]); T(sp,1944,1980);});
const millL=label('THE MILL — ore fed from the headframe, stepping down by gravity',3.9,'#c9c2ae'); millL.position.set(46,19,-14); T(millL,1944,1978);
const f78=label('★ 1978 — THE MILL BURNS · the headframe survives',4.6,'#ff6a3a'); f78.position.set(44,13,-10); T(f78,1978,1982);
// rail BEHIND the mill (per RM) with ore cars, loading out concentrates
const millRail=new THREE.Mesh(new THREE.BoxGeometry(120,0.15,1.4),new THREE.MeshLambertMaterial({color:0x6b6258}));
millRail.position.set(44,0.1,-24); T(millRail,1944);
for(let i=0;i<3;i++){
  const ocar=new THREE.Mesh(new THREE.BoxGeometry(4,1.6,2),new THREE.MeshLambertMaterial({color:0x54443a}));
  ocar.position.set(42+i*5.5,0.9,-24); T(ocar,1944,1978);
}

// quarry-era touch
const doNotL=label('WORKING QUARRY OFFICE — today',4,'#b8ab90'); doNotL.position.set(-26,14,9); T(doNotL,1997);

// era captions
const ERAS=[
 [1880,1885,'Before the shaft plant — the open-cut years wind down.'],
 [1885,1923,'The wooden works: steam hoist, timber tower, boiler smoke. No electric lights — ever.'],
 [1923,1930,'★ 1923: a gasoline torch explodes at 1 a.m. The wooden hoist house and tower burn; blazing timbers fall into the shaft; twenty men escape by a days-old tunnel.'],
 [1930,1944,'The Depression. A bare collar and the wind.'],
 [1944,1951,'Wartime revival — the mill rises; the modern plant takes shape.'],
 [1951,1954,'The brick era: hoist house, office (with the post office), steel headframe, tanks, thickener.'],
 [1954,1966,'All-underground. The ropes run day and night; the thickener rakes creep; the drums turn behind the brick.'],
 [1966,1978,'1966: the last cage. Ropes still. The thickener fills with rock. The quarry idea stirs (Elder), then the Malloys arrive — and the office becomes a home.'],
 [1978,1997,'★ 1978: the mill burns; the headframe stands. The Malloy quarry years — IMTR thrives around the surviving plant.'],
 [1997,2027,'Weber, then New Frontier. The brick building works on as the quarry office; headframe, tanks and thickener ring keep their posts. Nothing here has stopped being useful since 1846.']
];

// time engine
const yrEl=document.getElementById('year'),slider=document.getElementById('yr'),eraEl=document.getElementById('era');
function setYear(y){yrEl.textContent=y;
 timed.forEach(t=>t.obj.visible=(y>=t.start&&y<=t.end));
 const e=ERAS.find(e=>y>=e[0]&&y<e[1]); if(e)eraEl.textContent=e[2];}
slider.oninput=e=>{playing=false;playBtn.textContent='▶ PLAY';setYear(+e.target.value);};
let playing=false;const playBtn=document.getElementById('play');
playBtn.onclick=()=>{playing=!playing;playBtn.textContent=playing?'⏸ PAUSE':'▶ PLAY';
 if(playing&&+slider.value>=2026)slider.value=1880;};
setYear(1900);
document.getElementById('hudx').onclick=()=>{document.getElementById('hud').style.display='none';document.getElementById('info').style.display='block';};
document.getElementById('info').onclick=()=>{document.getElementById('hud').style.display='block';document.getElementById('info').style.display='none';};

// orbit controls
let sph=new THREE.Spherical().setFromVector3(camera.position.clone().sub(target));
let dragging=false,panning=false,px=0,py=0;
canvas.addEventListener('pointerdown',e=>{dragging=true;panning=e.shiftKey||e.button===2;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>dragging=false);
addEventListener('pointermove',e=>{if(!dragging)return;
 const dx=(e.clientX-px)/innerWidth,dy=(e.clientY-py)/innerHeight;px=e.clientX;py=e.clientY;
 if(panning){const right=new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);
  const up=new THREE.Vector3().setFromMatrixColumn(camera.matrix,1);
  target.addScaledVector(right,-dx*sph.radius*1.4);target.addScaledVector(up,dy*sph.radius*1.4);
 }else{sph.theta-=dx*Math.PI*2;sph.phi-=dy*Math.PI;
  sph.phi=Math.max(0.08,Math.min(Math.PI/2-0.02,sph.phi));}});
canvas.addEventListener('wheel',e=>{e.preventDefault();
 sph.radius*=(1+Math.sign(e.deltaY)*0.08);sph.radius=Math.max(12,Math.min(300,sph.radius));},{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
let lastPinch=0;
canvas.addEventListener('touchmove',e=>{if(e.touches.length===2){
 const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
 if(lastPinch)sph.radius=Math.max(12,Math.min(300,sph.radius*(lastPinch/d)));
 lastPinch=d;e.preventDefault();}},{passive:false});
canvas.addEventListener('touchend',()=>lastPinch=0);

function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;
 if(canvas.width!==w||canvas.height!==h){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}}
let lastTick=0;
function animate(t){requestAnimationFrame(animate);resize();
 sph.theta+=0.0011;
 if(playing&&t-lastTick>150){lastTick=t;let y=+slider.value+1;
  if(y>2026){y=2026;playing=false;playBtn.textContent='▶ PLAY';}
  slider.value=y;setYear(y);}
 // rakes turn while working
 if(typeof rakes!=='undefined'&&rakes.visible)rakes.rotation.y+=0.004;
 camera.position.setFromSpherical(sph).add(target);
 camera.lookAt(target);renderer.render(scene,camera);}
animate();
